<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jordan's CRO Experience</title>

    <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
<style>
  body {
    font-family: sans-serif;
    margin: 0;
    padding: 40px;
    background: #fafafa;
  }

  .carousel {
    position: relative;
    width: 100%;
    max-width: 780px;
    margin: auto;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.45s ease;
  }

  .carousel-slide {
    min-width: 100%;
    box-sizing: border-box;
  }

  .carousel-slide img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }

  /* Arrows */
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: white;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    cursor: pointer;
    font-size: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .carousel-btn.prev { left: 10px; }
  .carousel-btn.next { right: 10px; }

  /* Pagination */
  .carousel-nav {
    text-align: center;
    margin-top: 12px;
  }

  .carousel-indicator {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #ccc;
    margin: 0 6px;
    border-radius: 50%;
    cursor: pointer;
  }

  .carousel-indicator.active {
    background: #111;
  }
</style>
</head>

<body>
  <!-- Header / Navigation -->
  <header class="site-header" id="site-header">
    <div class="container nav-row">
      <a class="brand" href="https://jordanshapiro555-lab.github.io/CRO-Consulting/">Jordan's CRO Studio</a>

      <nav class="main-nav" id="main-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="https://jordanshapiro555-lab.github.io/CRO-Consulting/experience" class="nav-link">Experience</a></li>
          <li><a href="https://jordanshapiro555-lab.github.io/CRO-Consulting/case-studies" class="nav-link">Case Studies</a></li>
          <li><a href="https://jordanshapiro555-lab.github.io/CRO-Consulting/my-process" class="nav-link">My Process</a></li>
        </ul>
        <a class="btn btn-primary" href="https://jordanshapiro555-lab.github.io/CRO-Consulting/contact">Get in touch</a>
      </nav>

      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Open menu">
        <span class="hamburger"></span>
      </button>
    </div>
  </header>
<h2>Full Carousel Example (All Required HTML Included)</h2>

<div class="carousel">
  
  <!-- PREV BUTTON -->
  <button class="carousel-btn prev">&#10094;</button>

  <!-- TRACK (REQUIRED!) -->
  <div class="carousel-track">
    
    <!-- DUPLICATED SLIDES BELOW -->

    <div class="carousel-slide">
      <img src="https://picsum.photos/780/400?random=1" alt="Slide 1">
    </div>

    <div class="carousel-slide">
      <img src="https://picsum.photos/780/400?random=2" alt="Slide 2">
    </div>

    <div class="carousel-slide">
      <img src="https://picsum.photos/780/400?random=3" alt="Slide 3">
    </div>

    <!-- duplicated items (required for seamless looping) -->
    <div class="carousel-slide">
      <img src="https://picsum.photos/780/400?random=1" alt="Slide 1 duplicate">
    </div>

  </div>

  <!-- NEXT BUTTON -->
  <button class="carousel-btn next">&#10095;</button>

</div>

<!-- PAGINATION DOTS -->
<div class="carousel-nav">
  <span class="carousel-indicator active" data-slide="0"></span>
  <span class="carousel-indicator" data-slide="1"></span>
  <span class="carousel-indicator" data-slide="2"></span>
</div>

<script>
  const track = document.querySelector('.carousel-track');
  const slides = Array.from(track.children);
  const nextBtn = document.querySelector('.carousel-btn.next');
  const prevBtn = document.querySelector('.carousel-btn.prev');
  const dots = document.querySelectorAll('.carousel-indicator');

  let index = 0;
  const slideCount = 3; // original slides before duplicates

  function updateCarousel() {
    track.style.transform = `translateX(-${index * 100}%)`;

    dots.forEach(d => d.classList.remove('active'));
    dots[index % slideCount].classList.add('active');
  }

  nextBtn.addEventListener('click', () => {
    index++;
    if (index > slides.length - 1) {
      index = 0;
    }
    updateCarousel();
  });

  prevBtn.addEventListener('click', () => {
    index--;
    if (index < 0) {
      index = slideCount - 1;
    }
    updateCarousel();
  });

  dots.forEach(dot => {
    dot.addEventListener('click', (e) => {
      index = Number(dot.dataset.slide);
      updateCarousel();
    });
  });
</script>

  <script src="script.js"></script>
  
</body>
